<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SStudy - Study Timer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/svg" href="logo.svg">
    <style>
        /* --- THEME COLORS --- */
        :root {
            --bg-sidebar: #000000;
            --bg-main: #0a0a0a;
            --bg-card: #171717;
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --text-white: #ffffff;
            --text-muted: #a1a1aa;
            --border-color: #2a2a2a;
            --success: #22c55e;
            --warning: #facc15;
            --danger: #ef4444;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-white); display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR (Consistent with AI Assistant) --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            border-right: 1px solid var(--border-color);
        }

        .sidebar-logo {
            font-size: 26px;
            font-weight: 800;
            color: white;
            margin-bottom: 30px;
            padding-left: 20px;
            letter-spacing: -0.5px;
        }
        .sidebar-logo span { color: var(--primary); }

        .sidebar-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            border-radius: 12px;
            transition: 0.2s;
        }
        
        .nav-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .nav-link.active {
            background: rgba(30, 27, 75, 0.6);
            color: white;
            border-left: 3px solid var(--primary);
            border-radius: 0 12px 12px 0;
            margin-left: -10px;
            padding-left: 22px;
        }

        .nav-link i {
            width: 20px;
            text-align: center;
            font-size: 16px;
        }
        /* Specific colors for nav icons */
        .nav-link[href="dashboard.html"] i { color: #3b82f6; } /* Blue */
        .nav-link[href="subjects.html"] i { color: #22c55e; } /* Green */
        .nav-link[href="ai-assistant.html"] i { color: #ec4899; } /* Pink */
        .nav-link[href="tasks.html"] i { color: #10b981; } /* Teal */
        .nav-link[href="timer.html"] i { color: #f43f5e; } /* Red - active */
        .nav-link[href="analytics.html"] i { color: #818cf8; } /* Indigo */


        /* --- MAIN CONTENT / TIMER LAYOUT --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            gap: 30px;
            overflow-y: auto;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Three columns */
            grid-template-rows: auto auto; /* Two rows for layout */
            gap: 25px;
            width: 100%;
            max-width: 1200px; /* Limit overall width */
            align-items: start;
        }

        .timer-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .timer-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        /* Main Timer Area */
        .main-timer {
            grid-column: 1 / span 3; /* Spans all three columns */
            grid-row: 1; /* First row */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 25px;
            text-align: center;
        }

        .main-timer h2 {
            font-size: 18px;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .time-display {
            font-size: 8rem; /* Large font size for the timer */
            font-weight: 700;
            letter-spacing: -3px;
            color: var(--text-white);
            margin-bottom: 30px;
        }

        .timer-controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .timer-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .timer-btn:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        .timer-btn:active { transform: translateY(0); }
        .timer-btn:disabled { background-color: #3f3f46; cursor: not-allowed; }

        .timer-btn.reset { background-color: #4b5563; }
        .timer-btn.reset:hover { background-color: #374151; }

        .timer-mode-selector {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .mode-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .mode-btn.active, .mode-btn:hover {
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary);
            border-color: var(--primary);
        }

        /* Small Stat Cards */
        .stat-card {
            min-height: 150px; /* Ensure consistent height */
        }
        .stat-card h3 {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .stat-card .value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-white);
        }
        .stat-card .value i {
            margin-right: 10px;
            font-size: 2rem;
        }

        .status-message {
            margin-top: 20px;
            font-size: 1.1rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-message.success { color: var(--success); }
        .status-message.warning { color: var(--warning); }
        .status-message.danger { color: var(--danger); }
    </style>
</head>
<body>

   <aside class="sidebar">
        <div class="sidebar-logo" style="display: flex; align-items: center;">
            <img src="logo.png" alt="SpaceStudy Logo" style="width: 32px; height: 32px; margin-right: 12px; border-radius: 8px;">
            <div><span>S</span>paceStudy</div>
        </div>
        
        <nav class="sidebar-menu">
            <a href="dashboard.html" class="nav-link">
                <i class="fas fa-layer-group" style="color: #3b82f6;"></i> Dashboard
            </a>
            <a href="subject.html" class="nav-link">
                <i class="fas fa-book" style="color: #22c55e;"></i> Subjects
            </a>
            <a href="ai-assistant.html" class="nav-link">
                <i class="fas fa-robot" style="color: #ec4899;"></i> AI Assistant
            </a>
            <a href="tasks.html" class="nav-link">
                <i class="fas fa-check-square" style="color: #10b981;"></i> Tasks
            </a>
            <a href="timer.html" class="nav-link">
                <i class="fas fa-stopwatch" style="color: #f43f5e;"></i> Study Timer
            </a>
            <a href="analytics.html" class="nav-link">
                <i class="fas fa-chart-line" style="color: #818cf8;"></i> Analytics
            </a>
        </nav>
    </aside>
    <main class="main-content">
        <div class="timer-grid">
            <div class="timer-card main-timer">
                <h2 id="timerStatus">Ready to Focus</h2>
                <div class="time-display" id="timeDisplay">25:00</div>
                <div class="timer-controls">
                    <button id="startBtn" class="timer-btn" onclick="startTimer()"><i class="fas fa-play"></i> Start</button>
                    <button id="pauseBtn" class="timer-btn" onclick="pauseTimer()" style="display:none;"><i class="fas fa-pause"></i> Pause</button>
                    <button id="resetBtn" class="timer-btn reset" onclick="resetTimer()"><i class="fas fa-undo"></i> Reset</button>
                </div>
                <div class="timer-mode-selector">
                    <button id="pomodoroBtn" class="mode-btn active" onclick="setMode('pomodoro')">Pomodoro (25m)</button>
                    <button id="shortBreakBtn" class="mode-btn" onclick="setMode('shortBreak')">Short Break (5m)</button>
                    <button id="longBreakBtn" class="mode-btn" onclick="setMode('longBreak')">Long Break (15m)</button>
                </div>
                <div id="statusMessage" class="status-message"></div>
            </div>

            <div class="timer-card stat-card">
                <h3><i class="fas fa-clock" style="color:#60a5fa;"></i> Sessions Completed</h3>
                <div class="value" id="sessionsCompleted">0</div>
            </div>
            <div class="timer-card stat-card">
                <h3><i class="fas fa-fire" style="color:#fbbf24;"></i> Daily Streak</h3>
                <div class="value" id="dailyStreak">0</div>
            </div>
            <div class="timer-card stat-card">
                <h3><i class="fas fa-hourglass-half" style="color:#a78bfa;"></i> Today's Study Time</h3>
                <div class="value" id="totalStudyTime">0h 0m</div>
            </div>
        </div>
    </main>

    <script>
        const timeDisplay = document.getElementById('timeDisplay');
        const timerStatus = document.getElementById('timerStatus');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const pomodoroBtn = document.getElementById('pomodoroBtn');
        const shortBreakBtn = document.getElementById('shortBreakBtn');
        const longBreakBtn = document.getElementById('longBreakBtn');
        const sessionsCompletedSpan = document.getElementById('sessionsCompleted');
        const dailyStreakSpan = document.getElementById('dailyStreak');
        const totalStudyTimeSpan = document.getElementById('totalStudyTime');
        const statusMessageDiv = document.getElementById('statusMessage');

        let timer; 
        let isRunning = false;
        let timeLeft = 1500; 
        let currentMode = 'pomodoro'; 
        let sessionsCount = 0;
        let totalStudyTime = 0; 
        let dailyStreak = 0; 

        const modes = {
            pomodoro: { duration: 1500, label: 'Focus Time', status: 'Time to focus!', emoji: '📚' },
            shortBreak: { duration: 300, label: 'Short Break', status: 'Short break!', emoji: '☕' },
            longBreak: { duration: 900, label: 'Long Break', status: 'Long break!', emoji: '🧘' }    
        };

        // --- INITIALIZATION ---
        window.onload = () => {
            loadStats();
            restoreTimerState(); // Check if a timer was running in the background!
        };

        // --- BACKGROUND SYNC LOGIC ---
        function restoreTimerState() {
            const savedMode = localStorage.getItem('sstudy_timer_mode');
            const savedIsRunning = localStorage.getItem('sstudy_timer_isRunning') === 'true';
            const savedEndTime = parseInt(localStorage.getItem('sstudy_timer_endTime'));
            const savedTimeLeft = parseInt(localStorage.getItem('sstudy_timer_timeLeft'));

            if (savedMode) currentMode = savedMode;
            
            // Update the UI to match the saved mode
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`${currentMode}Btn`).classList.add('active');
            updateTimerStatus(modes[currentMode].label);

            if (savedIsRunning && savedEndTime) {
                // Calculate how much time is left based on the real-world clock
                const now = Date.now();
                const remainingSeconds = Math.round((savedEndTime - now) / 1000);

                if (remainingSeconds <= 0) {
                    // The timer finished while you were on another page!
                    timeLeft = 0;
                    updateDisplay();
                    handleTimerEnd(true); // pass true to indicate we missed it
                } else {
                    // Timer is still going, resume the countdown
                    timeLeft = remainingSeconds;
                    startTimer(true); // pass true to just resume UI without resetting end time
                }
            } else {
                // Timer was paused or stopped
                timeLeft = savedTimeLeft || modes[currentMode].duration;
                updateDisplay();
            }
        }

        // --- TIMER CORE LOGIC ---
        function startTimer(isResuming = false) {
            if (isRunning && !isResuming) return; 
            
            isRunning = true;
            startBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-flex';
            resetBtn.disabled = false;
            disableModeButtons(true);
            
            // If starting fresh, set the exact future timestamp it should end
            if (!isResuming) {
                const endTime = Date.now() + (timeLeft * 1000);
                localStorage.setItem('sstudy_timer_endTime', endTime);
            }
            
            localStorage.setItem('sstudy_timer_isRunning', 'true');
            localStorage.setItem('sstudy_timer_mode', currentMode);
            
            updateStatusMessage(`Timer active! ${modes[currentMode].emoji}`, 'success');

            timer = setInterval(() => {
                // Always calculate based on the timestamp so it never lags
                const endTime = parseInt(localStorage.getItem('sstudy_timer_endTime'));
                timeLeft = Math.round((endTime - Date.now()) / 1000);
                
                if (currentMode === 'pomodoro' && timeLeft >= 0) {
                    // Increment total study time every second and save globally for Analytics
                    totalStudyTime++;
                    localStorage.setItem('sstudy_totalStudyTime', totalStudyTime);
                    updateStatsDisplay();
                }

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    isRunning = false;
                    localStorage.setItem('sstudy_timer_isRunning', 'false');
                    timeLeft = 0;
                    updateDisplay();
                    handleTimerEnd();
                } else {
                    updateDisplay();
                    localStorage.setItem('sstudy_timer_timeLeft', timeLeft);
                }
            }, 1000); 
        }

        function pauseTimer() {
            clearInterval(timer);
            isRunning = false;
            startBtn.style.display = 'inline-flex';
            pauseBtn.style.display = 'none';
            disableModeButtons(false);
            
            // Save state to local storage
            localStorage.setItem('sstudy_timer_isRunning', 'false');
            localStorage.setItem('sstudy_timer_timeLeft', timeLeft);
            
            updateStatusMessage(`Timer paused. ${modes[currentMode].emoji}`, 'warning');
        }

        function resetTimer() {
            clearInterval(timer);
            isRunning = false;
            startBtn.style.display = 'inline-flex';
            pauseBtn.style.display = 'none';
            resetBtn.disabled = true;
            disableModeButtons(false);
            
            timeLeft = modes[currentMode].duration;
            
            localStorage.setItem('sstudy_timer_isRunning', 'false');
            localStorage.setItem('sstudy_timer_timeLeft', timeLeft);
            
            updateDisplay();
            updateStatusMessage(`Timer reset.`, '');
        }

        function setMode(mode) {
            clearInterval(timer); 
            isRunning = false;
            currentMode = mode;
            timeLeft = modes[mode].duration;
            
            localStorage.setItem('sstudy_timer_mode', mode);
            localStorage.setItem('sstudy_timer_isRunning', 'false');
            localStorage.setItem('sstudy_timer_timeLeft', timeLeft);

            updateDisplay();
            updateTimerStatus(modes[mode].label);
            updateStatusMessage(modes[mode].status, '');

            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`${mode}Btn`).classList.add('active');

            startBtn.style.display = 'inline-flex';
            pauseBtn.style.display = 'none';
            resetBtn.disabled = true;
            disableModeButtons(false);
        }

        function handleTimerEnd(missedInBackground = false) {
            if (currentMode === 'pomodoro') {
                sessionsCount++;
                saveStats(); 
                
                // If it finished while we were on another page, make sure the time is added!
                if (missedInBackground) {
                    totalStudyTime += modes.pomodoro.duration;
                    localStorage.setItem('sstudy_totalStudyTime', totalStudyTime);
                    updateStatsDisplay();
                }

                updateStatusMessage(`Pomodoro completed! Take a break. ${modes.shortBreak.emoji}`, 'success');
                setTimeout(() => {
                    setMode('shortBreak');
                    startTimer();
                }, 2000); 
            } else {
                updateStatusMessage(`Break's over! Time to focus. ${modes.pomodoro.emoji}`, 'warning');
                setTimeout(() => {
                    setMode('pomodoro');
                    startTimer();
                }, 2000); 
            }
        }

        // --- UI UPDATES ---
        function updateDisplay() {
            // Prevent negative numbers just in case
            const safeTimeLeft = Math.max(0, timeLeft); 
            const minutes = Math.floor(safeTimeLeft / 60);
            const seconds = safeTimeLeft % 60;
            timeDisplay.textContent = 
                `${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            document.title = `(${timeDisplay.textContent}) SStudy Timer`; 
        }

        function updateTimerStatus(status) { timerStatus.textContent = status; }

        function disableModeButtons(disable) {
            pomodoroBtn.disabled = disable;
            shortBreakBtn.disabled = disable;
            longBreakBtn.disabled = disable;
        }

        function updateStatusMessage(message, type = '') {
            statusMessageDiv.textContent = message;
            statusMessageDiv.className = `status-message ${type}`; 
        }

        // --- STATS & LOCAL STORAGE ---
        function saveStats() {
            const today = new Date().toDateString();
            const lastStudyDay = localStorage.getItem('sstudy_lastStudyDay');

            if (lastStudyDay === today) {
                // Same day
            } else if (lastStudyDay) {
                const yesterday = new Date(lastStudyDay);
                yesterday.setDate(yesterday.getDate() + 1); 
                if (yesterday.toDateString() === today) {
                    dailyStreak++; // Streak continues
                } else {
                    dailyStreak = 1; // Streak broken
                }
            } else {
                dailyStreak = 1; 
            }
            
            localStorage.setItem('sstudy_sessionsCompleted', sessionsCount);
            localStorage.setItem('sstudy_dailyStreak', dailyStreak);
            localStorage.setItem('sstudy_lastStudyDay', today); 

            updateStatsDisplay();
        }

        function loadStats() {
            sessionsCount = parseInt(localStorage.getItem('sstudy_sessionsCompleted') || '0');
            totalStudyTime = parseInt(localStorage.getItem('sstudy_totalStudyTime') || '0');
            dailyStreak = parseInt(localStorage.getItem('sstudy_dailyStreak') || '0');

            const today = new Date().toDateString();
            const lastStudyDay = localStorage.getItem('sstudy_lastStudyDay');
            if (lastStudyDay && lastStudyDay !== today) {
                const yesterday = new Date(lastStudyDay);
                yesterday.setDate(yesterday.getDate() + 1);
                if (yesterday.toDateString() !== today) {
                    dailyStreak = 0; 
                    localStorage.setItem('sstudy_dailyStreak', dailyStreak);
                }
            } else if (!lastStudyDay) {
                 dailyStreak = 0; 
                 localStorage.setItem('sstudy_dailyStreak', dailyStreak);
            }

            updateStatsDisplay();
        }

        function updateStatsDisplay() {
            sessionsCompletedSpan.textContent = sessionsCount;
            dailyStreakSpan.textContent = dailyStreak;
            
            const hours = Math.floor(totalStudyTime / 3600);
            const minutes = Math.floor((totalStudyTime % 3600) / 60);
            totalStudyTimeSpan.textContent = `${hours}h ${minutes}m`;
        }
    </script>
<script src="aura-plugin.js"></script>
</body>
</html>
