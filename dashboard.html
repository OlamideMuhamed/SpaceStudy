    <meta charset="UTF-8">

    <style>
        /* --- EXACT THEME COLORS --- */
        :root {
            --bg-sidebar: #050505; 
            --bg-main: #0a0a0a;    
            --bg-card: #121212;    
            --primary: #6366f1;    
            --text-white: #ffffff;
            --text-muted: #a1a1aa;
            --border: #1e1e1e;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-white); display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: var(--sidebar-width); 
            background-color: var(--bg-sidebar); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 25px 0; 
        }

        .sidebar-logo {
            font-size: 26px;
            font-weight: 800;
            color: white;
            margin-bottom: 30px;
            padding-left: 20px;
            letter-spacing: -0.5px;
        }
        .sidebar-logo span { color: var(--primary); } 

        .sidebar-menu { list-style: none; padding: 0 10px; display: flex; flex-direction: column; gap: 2px; }
        .nav-link { 
            padding: 12px 15px; 
            margin-bottom: 5px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            color: var(--text-muted); 
            text-decoration: none; 
            font-size: 15px; 
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-link i { width: 20px; text-align: center; font-size: 16px; }
        
        .nav-link:hover { background: rgba(255, 255, 255, 0.05); color: white; }
        .nav-link.active { 
            background: rgba(99, 102, 241, 0.15); 
            color: white; 
            border-left: 3px solid var(--primary); 
            border-radius: 0 12px 12px 0;
            margin-left: -10px;
            padding-left: 22px;
        }

        /* --- LOGOUT BUTTON --- */
        .logout-btn { color: #ef4444; margin-top: auto; }
        .logout-btn i { color: #ef4444; }
        .logout-btn:hover { background: rgba(239, 68, 68, 0.1); color: #f87171; border-left: none; }

        /* --- CONTENT AREA --- */
        .content { flex: 1; padding: 40px 50px; overflow-y: auto; }
        
        .header h1 { font-size: 30px; font-weight: 800; margin-bottom: 5px; }
        .date { color: var(--text-muted); font-size: 15px; margin-bottom: 25px; display: block; }

        .actions { display: flex; gap: 10px; margin-bottom: 35px; }
        .btn { 
            padding: 10px 16px; border-radius: 10px; font-weight: 700; font-size: 13px; 
            text-decoration: none; display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-outline { background: transparent; border: 1.5px solid #2e2e2e; color: white; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* STAT CARDS */
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { 
            background: var(--bg-card); border: 1px solid var(--border); 
            border-radius: 15px; padding: 22px; display: flex; align-items: center; gap: 18px; 
        }
        .icon-circle { 
            width: 48px; height: 48px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; font-size: 18px;
        }
        .purple { background: rgba(99, 102, 241, 0.1); color: var(--primary); }
        .green { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .pink { background: rgba(244, 114, 182, 0.1); color: #f472b6; }

        .stat-info h3 { font-size: 28px; font-weight: 800; }
        .stat-info p { font-size: 13px; color: var(--text-muted); }

        /* PERFORMANCE GRID */
        .grid { display: grid; grid-template-columns: 1.8fr 1fr; gap: 20px; }
        .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 15px; padding: 25px; }
        .panel h2 { font-size: 18px; margin-bottom: 20px; }

        .chart-container { height: 300px; width: 100%; }
        
        .task-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 15px 0; border-bottom: 1px solid #1a1a1a;
        }
        .task-item:last-child { border-bottom: none; }
        .task-left { display: flex; align-items: center; gap: 12px; }
        .circle { width: 18px; height: 18px; border: 2px solid #3f3f46; border-radius: 50%; }
        .task-tag { color: var(--primary); font-size: 12px; font-weight: 800; }
    </style>

    <main class="content">
        <header class="header">
            <h1 id="greetingText">Loading...</h1>
            <span class="date" id="currentDateDisplay">Date Loading...</span>
            <div class="actions">
                <a href="subject.html" class="btn btn-primary"><i class="fas fa-plus"></i> Add Grade</a>

        <section class="stats">
            <div class="stat-card">
                <div class="icon-circle purple"><i class="fas fa-star"></i></div>

            </div>

                <div class="icon-circle pink"><i class="fas fa-fire"></i></div>

        <div class="grid">
            <div class="panel">
                <h2>Grade Trend</h2>
                <div class="chart-container"><canvas id="mainChart"></canvas></div>
            </div>
            <div class="panel">
                <div style="display:flex; justify-content:space-between; margin-bottom: 10px;">
                    <h2>Upcoming Tasks</h2>
                    <a href="tasks.html" style="color:var(--text-muted); font-size:12px; text-decoration:none;">View all</a>
                </div>
                <div id="dashboardTasksList"></div>
            </div>
        </div>
    </main>

    <script>
        // --- NAME GREETING LOGIC ---
        function setGreeting() {
            const greetingEl = document.getElementById('greetingText');
            // Try to pull user data from local storage
            const userData = JSON.parse(localStorage.getItem('ss_current_user')) || JSON.parse(localStorage.getItem('sstudy_session'));
            
            const now = new Date();
            const hour = now.getHours();
            let timeGreeting = "Good evening";

            if (hour < 12) timeGreeting = "Good morning";
            else if (hour < 18) timeGreeting = "Good afternoon";

            // If user logged in, use their first name. Otherwise, say "Student"
            const nameToShow = userData && userData.name ? userData.name.split(' ')[0] : 'Student';
            greetingEl.innerHTML = `${timeGreeting}, ${nameToShow}! 👋`;
        }
        setGreeting(); // Run the greeting function

        // Clear data on logout
        function handleLogout() {
            localStorage.removeItem('ss_current_user');
            localStorage.removeItem('sstudy_session');
        }

        // --- DYNAMIC HEADER DATE ---
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDateDisplay').innerText = new Date().toLocaleDateString('en-GB', dateOptions);

        // --- STREAK LOGIC ---
        function updateStreak() {
            const streakEl = document.getElementById('streakCount');
            let currentStreak = parseInt(localStorage.getItem('ss_current_streak')) || 0;
            let lastActionTime = parseInt(localStorage.getItem('ss_last_action_time')) || 0;
            
            const now = Date.now(); 
            const twentyFourHours = 24 * 60 * 60 * 1000;
            const fortyEightHours = 48 * 60 * 60 * 1000;

            if (lastActionTime === 0) {
                currentStreak = 0;
                localStorage.setItem('ss_last_action_time', now.toString());
                localStorage.setItem('ss_current_streak', currentStreak.toString());
            } else {
                const timePassed = now - lastActionTime;
                if (timePassed >= twentyFourHours && timePassed <= fortyEightHours) {
                    currentStreak += 1;
                    localStorage.setItem('ss_last_action_time', now.toString());
                    localStorage.setItem('ss_current_streak', currentStreak.toString());
                } else if (timePassed > fortyEightHours) {
                    currentStreak = 0;
                    localStorage.setItem('ss_last_action_time', now.toString());
                    localStorage.setItem('ss_current_streak', currentStreak.toString());
                }
            }
            streakEl.innerText = `${currentStreak} 🔥`;
        }
        updateStreak();

        // --- EXISTING CHART SETUP ---
        const ctx = document.getElementById('mainChart').getContext('2d');
        const grad = ctx.createLinearGradient(0, 0, 0, 300);
        grad.addColorStop(0, 'rgba(99, 102, 241, 0.3)');
        grad.addColorStop(1, 'rgba(99, 102, 241, 0)');

        const allSubjects = JSON.parse(localStorage.getItem('ss_user_subjects')) || [];
        let allGrades = [];
        let totalScoreSum = 0;
        let totalScoreCount = 0;

        allSubjects.forEach(sub => {
            if (sub.grades && sub.grades.length > 0) {
                sub.grades.forEach(g => {
                    if(g.date && g.percentage !== undefined) {
                        allGrades.push({ date: g.date, score: Number(g.percentage) });
                        totalScoreSum += Number(g.percentage);
                        totalScoreCount++;
                    }
                });
            }
        });

        const avgDisplay = document.getElementById('avgGradeDisplay');
        if (totalScoreCount === 0) {
            avgDisplay.innerText = "--%";
        } else {
            const finalAverage = Math.round(totalScoreSum / totalScoreCount);
            avgDisplay.innerText = finalAverage + "%";
        }

        allGrades.sort((a, b) => new Date(a.date) - new Date(b.date));

        let chartLabels = [];
        let chartData = [];

        if (allGrades.length === 0) {
            chartLabels = ['Add grades to see your trend'];
            chartData = [0];
        } else {
            allGrades.forEach(g => {
                chartLabels.push(g.date);
                chartData.push(g.score);
            });
        }

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: chartLabels,
                datasets: [{
                    data: chartData,
                    borderColor: '#6366f1', borderWidth: 3, fill: true, backgroundColor: grad,
                    tension: 0.4, pointRadius: 4, pointBackgroundColor: '#fff'
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, max: 100, grid: { color: '#1a1a1a' }, ticks: { color: '#52525b' } },
                    x: { grid: { display: false }, ticks: { color: '#52525b' } }
                }
            }
        });

        // --- TASKS LOGIC ---
        function renderDashboardTasks() {
            const tasksList = document.getElementById('dashboardTasksList');
            const tasksDueTodayEl = document.getElementById('tasksDueTodayCount');
            
            let tasks = JSON.parse(localStorage.getItem('ss_user_tasks')) || [];
            let upcomingTasks = tasks.filter(task => !task.completed);

            upcomingTasks.sort((a, b) => {
                const dateA = a.date ? new Date(a.date) : new Date('3000-01-01'); 
                const dateB = b.date ? new Date(b.date) : new Date('3000-01-01');
                return dateA - dateB;
            });

            const todayStr = new Date().toDateString();
            const tasksDueToday = upcomingTasks.filter(task => {
                if (!task.date) return false;
                return new Date(task.date).toDateString() === todayStr;
            });
            
            tasksDueTodayEl.innerText = tasksDueToday.length;
            tasksList.innerHTML = '';

            if (upcomingTasks.length === 0) {
                tasksList.innerHTML = `
                    <div style="text-align: center; color: var(--text-muted); padding: 30px 0; font-style: italic; font-size: 14px;">
                        No upcoming tasks! 🎉
                    </div>
                `;
                return;
            }

            upcomingTasks.slice(0, 5).forEach(task => {
                let dateText = '';
                let colorClass = 'var(--primary)';

                if (task.date) {
                    const taskDate = new Date(task.date);
                    const today = new Date();
                    const tomorrow = new Date(today);
                    tomorrow.setDate(tomorrow.getDate() + 1);

                    if (taskDate.toDateString() === today.toDateString()) {
                        dateText = 'Today';
                        colorClass = '#ef4444';
                    } else if (taskDate.toDateString() === tomorrow.toDateString()) {
                        dateText = 'Tomorrow';
                    } else if (taskDate < today && taskDate.toDateString() !== today.toDateString()) {
                        dateText = 'Overdue';
                        colorClass = '#f87171';
                    } else {
                        const diffTime = Math.abs(taskDate - today);
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                        dateText = `in ${diffDays}d`;
                    }
                }

                const tagHtml = dateText ? `<span class="task-tag" style="color: ${colorClass}">${dateText}</span>` : '';

                tasksList.innerHTML += `
                    <div class="task-item">
                        <div class="task-left">
                            <div class="circle"></div>
                            <span>${task.text}</span>
                        </div>
                        ${tagHtml}
                    </div>
                `;
            });
        }
        renderDashboardTasks();
    </script>
