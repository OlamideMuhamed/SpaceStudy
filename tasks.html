<!DOCTYPE html>
<html lang="en">
<head>
<script src="db.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SStudy - Tasks</title>
    <link rel="icon" type="image/svg" href="logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- BASE THEME COLORS --- */
        :root {
            --bg-sidebar: #050505; 
            --bg-main: #0a0a0a;    
            --bg-card: #121212;    
            --primary: #6366f1;    
            --primary-hover: #4f46e5;
            --text-white: #ffffff;
            --text-muted: #a1a1aa;
            --border: #1e1e1e;
            --sidebar-width: 260px;
            --red-danger: #ef4444;
            --yellow-warning: #f59e0b;
            --green-success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-white); display: flex; height: 100vh; overflow: hidden; }
        a { text-decoration: none; }

        /* --- SIDEBAR (Standardized for SpaceStudy) --- */
        .sidebar { 
            width: var(--sidebar-width); 
            background-color: var(--bg-sidebar); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 25px 0; 
        }

        .sidebar-logo {
            font-size: 26px;
            font-weight: 800;
            color: white;
            margin-bottom: 30px;
            padding-left: 20px;
            letter-spacing: -0.5px;
        }
        .sidebar-logo span { color: var(--primary); } 

        .sidebar-menu { list-style: none; padding: 0 10px; display: flex; flex-direction: column; gap: 2px; }
        .nav-link { 
            padding: 12px 15px; 
            margin-bottom: 5px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            color: var(--text-muted); 
            text-decoration: none; 
            font-size: 15px; 
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-link i { width: 20px; text-align: center; font-size: 16px; }
        
        .nav-link:hover { background: rgba(255, 255, 255, 0.05); color: white; }
        .nav-link.active { 
            background: rgba(99, 102, 241, 0.15); 
            color: white; 
            border-left: 3px solid var(--primary); 
            border-radius: 0 12px 12px 0;
            margin-left: -10px;
            padding-left: 22px;
        }

        .logout-btn { color: var(--red-danger); margin-top: auto; }
        .logout-btn i { color: var(--red-danger); }
        .logout-btn:hover { background: rgba(239, 68, 68, 0.1); color: #f87171; border-left: none; }

        /* --- CONTENT AREA --- */
        .content { flex: 1; padding: 40px 50px; overflow-y: auto; }
        .header-section { margin-bottom: 30px; }
        .header-text h1 { font-size: 30px; font-weight: 800; margin-bottom: 5px; }
        .header-text p { color: var(--text-muted); font-size: 15px; }

        /* --- ADD TASK FORM --- */
        .add-task-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 15px; padding: 25px; margin-bottom: 30px; }
        .form-group { display: flex; gap: 15px; align-items: center; }

        input[type="text"], input[type="date"] {
            background: var(--bg-main); border: 1px solid var(--border); color: white;
            padding: 12px 15px; border-radius: 10px; font-size: 14px; outline: none; transition: 0.2s;
        }
        input[type="text"]:focus, input[type="date"]:focus { border-color: var(--primary); }
        input[type="text"] { flex: 1; }

        ::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        .btn-add { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-add:hover { background: var(--primary-hover); transform: translateY(-2px); }

        /* --- DETAILED LIST LAYOUT --- */
        .task-category-section { margin-top: 30px; }
        .task-category-section h2 { font-size: 18px; font-weight: 700; color: var(--text-white); margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .task-list-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 20px;
        }
        .task-item-detailed {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .task-item-detailed:last-child { border-bottom: none; }
        .task-item-detailed.completed { opacity: 0.6; }

        .task-left-detailed { display: flex; align-items: center; gap: 15px; flex-grow: 1; }
        .task-checkbox-detailed { width: 22px; height: 22px; border: 2px solid var(--text-muted); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; }
        .task-item-detailed.completed .task-checkbox-detailed { background: var(--green-success); border-color: var(--green-success); }
        .task-item-detailed.completed .task-checkbox-detailed::after { content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: white; font-size: 12px; }

        .task-text-detailed { font-size: 15px; font-weight: 500; color: var(--text-white); }
        .task-item-detailed.completed .task-text-detailed { text-decoration: line-through; color: var(--text-muted); }

        .task-details-right { display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        .task-date-detailed { font-size: 13px; font-weight: 600; padding: 5px 10px; background: rgba(255,255,255,0.05); border-radius: 6px; color: var(--yellow-warning); }
        .task-date-detailed.due-today { color: var(--red-danger); background: rgba(239, 68, 68, 0.1); }
        .task-date-detailed.past-due { color: #f87171; background: rgba(239, 68, 68, 0.2); }

        .delete-btn { color: var(--red-danger); cursor: pointer; background: none; border: none; font-size: 16px; padding: 5px; opacity: 0.5; transition: 0.2s; }
        .task-item-detailed:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: #f87171; transform: scale(1.1); }

        .empty-state { text-align: center; color: var(--text-muted); padding: 40px 0; font-style: italic; background: var(--bg-card); border: 1px dashed var(--border); border-radius: 12px; margin-top: 20px;}
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo" style="display: flex; align-items: center;">
            <img src="logo.png" alt="SpaceStudy Logo" style="width: 32px; height: 32px; margin-right: 12px; border-radius: 8px;">
            <div><span>S</span>paceStudy</div>
        </div>
        
        <nav class="sidebar-menu">
            <a href="dashboard.html" class="nav-link">
                <i class="fas fa-layer-group" style="color: #3b82f6;"></i> Dashboard
            </a>
            <a href="subject.html" class="nav-link">
                <i class="fas fa-book" style="color: #22c55e;"></i> Subjects
            </a>
            <a href="ai-assistant.html" class="nav-link">
                <i class="fas fa-robot" style="color: #ec4899;"></i> AI Assistant
            </a>
            <a href="tasks.html" class="nav-link active">
                <i class="fas fa-check-square" style="color: #10b981;"></i> Tasks
            </a>
            <a href="timer.html" class="nav-link">
                <i class="fas fa-stopwatch" style="color: #f43f5e;"></i> Study Timer
            </a>
            <a href="analytics.html" class="nav-link">
                <i class="fas fa-chart-line" style="color: #818cf8;"></i> Analytics
            </a>
        </nav>
    </aside>
    
    <main class="content">
        <header class="header-section">
            <div class="header-text">
                <h1>My Tasks 📝</h1>
                <p>Crush your goals one checkbox at a time.</p>
            </div>
        </header>

        <section class="add-task-container">
            <form id="taskForm" class="form-group">
                <input type="text" id="taskInput" placeholder="What needs to be done?" required autocomplete="off">
                <input type="date" id="dateInput">
                <button type="submit" class="btn-add"><i class="fas fa-plus"></i> Add Task</button>
            </form>
        </section>

        <section id="tasksDisplaySection"></section>
    </main>

    <script>
        // 1. Initialize variables
        const taskForm = document.getElementById('taskForm');
        const taskInput = document.getElementById('taskInput');
        const dateInput = document.getElementById('dateInput');
        const tasksDisplaySection = document.getElementById('tasksDisplaySection');

        // Load tasks from local storage
        let tasks = JSON.parse(localStorage.getItem('ss_user_tasks')) || [];

        // Helper to format dates cleanly
        function formatDate(dateString) {
            if (!dateString) return null;
            const dateObj = new Date(dateString);
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);

            if (dateObj.toDateString() === today.toDateString()) {
                return { text: 'Today', class: 'due-today' };
            } else if (dateObj.toDateString() === tomorrow.toDateString()) {
                return { text: 'Tomorrow', class: 'due-today' }; 
            } else if (dateObj < today) { 
                return { text: dateObj.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }), class: 'past-due' };
            } else {
                return { text: dateObj.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }), class: '' };
            }
        }

        // 2. Render Tasks into split lists
        function renderTasks() {
            tasksDisplaySection.innerHTML = ''; // Clear container

            // Build structural containers
            const upcomingContainer = document.createElement('div');
            upcomingContainer.className = 'task-category-section';
            upcomingContainer.innerHTML = '<h2>Upcoming Tasks</h2><div id="upcomingTasksList" class="task-list-container"></div>';
            tasksDisplaySection.appendChild(upcomingContainer);

            const completedContainer = document.createElement('div');
            completedContainer.className = 'task-category-section';
            completedContainer.innerHTML = '<h2>Completed Tasks</h2><div id="completedTasksList" class="task-list-container"></div>';
            tasksDisplaySection.appendChild(completedContainer);

            const upcomingList = document.getElementById('upcomingTasksList');
            const completedList = document.getElementById('completedTasksList');

            // Sort tasks: Earliest date first
            tasks.sort((a, b) => {
                const dateA = a.date ? new Date(a.date) : new Date('3000-01-01'); 
                const dateB = b.date ? new Date(b.date) : new Date('3000-01-01');
                return dateA - dateB;
            });

            // Populate the lists
            tasks.forEach(task => {
                const formattedDate = formatDate(task.date);
                const taskEl = document.createElement('div');
                taskEl.className = `task-item-detailed ${task.completed ? 'completed' : ''}`;
                
                taskEl.innerHTML = `
                    <div class="task-left-detailed">
                        <div class="task-checkbox-detailed" onclick="toggleTask(${task.id})"></div>
                        <span class="task-text-detailed">${task.text}</span>
                    </div>
                    <div class="task-details-right">
                        ${formattedDate ? `<span class="task-date-detailed ${formattedDate.class}">${formattedDate.text}</span>` : ''}
                        <button class="delete-btn" onclick="deleteTask(${task.id})" title="Delete Task">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
                
                if (task.completed) {
                    completedList.appendChild(taskEl);
                } else {
                    upcomingList.appendChild(taskEl);
                }
            });

            // Handle Empty States
            if (upcomingList.children.length === 0) {
                upcomingList.innerHTML = '<div class="empty-state">No upcoming tasks! 🎉</div>';
            }
            if (completedList.children.length === 0) {
                completedList.innerHTML = '<div class="empty-state">Complete a task to see it here!</div>';
            }
        }

        // 3. Add a new Task
        taskForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newTask = {
                id: Date.now(),
                text: taskInput.value.trim(),
                date: dateInput.value,
                completed: false
            };

            tasks.push(newTask);
            saveAndRender();

            taskInput.value = '';
            dateInput.value = '';
            taskInput.focus();
        });

        // 4. Toggle Task Completion
        window.toggleTask = function(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveAndRender();
            }
        };

        // 5. Delete a Task
        window.deleteTask = function(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveAndRender();
        };

        // 6. Save to Local Storage and re-render
        function saveAndRender() {
            localStorage.setItem('ss_user_tasks', JSON.stringify(tasks));
            renderTasks();
        }

        // Initial render on page load
        renderTasks();
    </script>
<script src="aura-plugin.js"></script>
</body>
</html>
