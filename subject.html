<!DOCTYPE html>
<html lang="en">
<head>
<script src="db.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SStudy - Subjects</title>
    <link rel="icon" type="image/svg" href="logo.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- GLOBAL VARIABLES --- */
        :root {
            --bg-sidebar: #050505; 
            --bg-main: #0a0a0a;    
            --bg-card: #121212;    
            --primary: #818cf8; 
            --primary-hover: #6366f1;
            --text-white: #ffffff;
            --text-muted: #a1a1aa;
            --border: #1e1e1e;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-white); display: flex; height: 100vh; overflow: hidden; }

        /* =========================================
           SIDEBAR
        ========================================= */
        .sidebar { 
            width: var(--sidebar-width); background-color: var(--bg-sidebar); 
            border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px 0; 
        }
        
        /* Updated Logo CSS */
        .sidebar-logo {
            font-size: 26px;
            font-weight: 800;
            color: white;
            margin-bottom: 30px;
            padding-left: 20px;
            letter-spacing: -0.5px;
        }
        .sidebar-logo span { color: var(--primary); }
        
        /* Updated Menu CSS */
        .sidebar-menu { list-style: none; padding: 0 10px; display: flex; flex-direction: column; gap: 2px; }
        .nav-link { 
            padding: 12px 15px; margin-bottom: 5px; border-radius: 12px; 
            display: flex; align-items: center; gap: 15px; color: var(--text-muted); 
            text-decoration: none; font-size: 15px; font-weight: 500; transition: 0.2s; 
        }
        
        .nav-link i { width: 20px; text-align: center; font-size: 16px; }

        .nav-link:hover { background: rgba(255, 255, 255, 0.05); color: white; }
        .nav-link.active { 
            background: rgba(99, 102, 241, 0.15); color: white; 
            border-left: 3px solid var(--primary); border-radius: 0 12px 12px 0; 
            margin-left: -10px; padding-left: 22px;
        }

        /* --- CONTENT AREA --- */
        .content { flex: 1; padding: 40px 50px; overflow-y: auto; }
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header-section h1 { font-size: 32px; font-weight: 800; }
        .btn { padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 14px; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; color: white; }
        .btn-primary { background: var(--primary); }
        .btn-primary:hover { background: var(--primary-hover); }

        /* --- SUBJECT GRID --- */
        .subject-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .subject-card { 
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 25px; 
            text-decoration: none; color: white; transition: 0.2s; display: flex; flex-direction: column; gap: 15px;
            cursor: pointer; position: relative;
        }
        .subject-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-icon { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        .card-actions { display: flex; align-items: center; gap: 10px; }
        .grade-badge { background: rgba(74, 222, 128, 0.1); color: #4ade80; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        
        /* Delete Button */
        .delete-btn {
            background: none; border: none; color: #3f3f46; font-size: 16px; cursor: pointer; transition: 0.2s;
            padding: 5px; border-radius: 5px;
        }
        .delete-btn:hover { color: #ef4444; background: rgba(239, 68, 68, 0.1); }

        .card-title { font-size: 20px; font-weight: 700; margin-bottom: 5px; }
        .card-stats { display: flex; gap: 15px; color: var(--text-muted); font-size: 13px; }
        .card-stats span { display: flex; align-items: center; gap: 5px; }

        .empty-state { text-align: center; color: var(--text-muted); padding: 50px 0; grid-column: 1 / -1; }

        /* --- MODAL --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: #121212; border: 1px solid #27272a; border-radius: 16px; width: 420px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .modal-header-top h2 { font-size: 22px; color: #f4f4f5; font-weight: 800; }
        .close-btn { background: none; border: none; color: #a1a1aa; font-size: 28px; cursor: pointer; line-height: 1;}
        .close-btn:hover { color: white; }
        
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 14px; color: #f4f4f5; margin-bottom: 10px; font-weight: 700;}
        .input-group input { width: 100%; background: #18181b; border: 1px solid #27272a; color: white; padding: 14px; border-radius: 10px; outline: none; font-size: 15px; }
        .input-group input:focus { border-color: var(--primary); }
        
        /* Color Picker */
        .color-options { display: flex; gap: 12px; align-items: center; }
        .color-circle { 
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer; 
            transition: 0.2s; border: 3px solid transparent;
        }
        .color-circle:hover { transform: scale(1.1); }
        .color-circle.selected { border-color: white; box-shadow: 0 0 0 2px black inset; }

        .btn-save { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 5px; transition: 0.2s; }
        .btn-save:hover { background: var(--primary-hover); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo" style="display: flex; align-items: center;">
            <img src="logo.png" alt="SpaceStudy Logo" style="width: 32px; height: 32px; margin-right: 12px; border-radius: 8px;">
            <div><span>S</span>paceStudy</div>
        </div>
        
        <nav class="sidebar-menu">
            <a href="dashboard.html" class="nav-link">
                <i class="fas fa-layer-group" style="color: #3b82f6;"></i> Dashboard
            </a>
            <a href="subject.html" class="nav-link active">
                <i class="fas fa-book" style="color: #22c55e;"></i> Subjects
            </a>
            <a href="ai-assistant.html" class="nav-link">
                <i class="fas fa-robot" style="color: #ec4899;"></i> AI Assistant
            </a>
            <a href="tasks.html" class="nav-link">
                <i class="fas fa-check-square" style="color: #10b981;"></i> Tasks
            </a>
            <a href="timer.html" class="nav-link">
                <i class="fas fa-stopwatch" style="color: #f43f5e;"></i> Study Timer
            </a>
            <a href="analytics.html" class="nav-link">
                <i class="fas fa-chart-line" style="color: #818cf8;"></i> Analytics
            </a>
        </nav>
    </aside>

    <main class="content">
        <div class="header-section">
            <h1>Your Vaults</h1>
            <button class="btn btn-primary" onclick="openSubjectModal()"><i class="fas fa-plus"></i> New Subject</button>
        </div>

        <div class="subject-grid" id="subjectsContainer">
            </div>
    </main>

    <div id="subjectModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header-top">
                <h2>Create Subject</h2>
                <button class="close-btn" onclick="closeSubjectModal()">&times;</button>
            </div>
            
            <div class="input-group">
                <label>Subject Name</label>
                <input type="text" id="newSubjectName" placeholder="e.g. Computer Science">
            </div>

            <div class="input-group">
                <label>Theme Color</label>
                <div class="color-options" id="colorPicker">
                    <div class="color-circle selected" style="background: #6366f1;" data-color="#6366f1" onclick="selectColor(this)"></div>
                    <div class="color-circle" style="background: #10b981;" data-color="#10b981" onclick="selectColor(this)"></div>
                    <div class="color-circle" style="background: #f59e0b;" data-color="#f59e0b" onclick="selectColor(this)"></div>
                    <div class="color-circle" style="background: #ef4444;" data-color="#ef4444" onclick="selectColor(this)"></div>
                    <div class="color-circle" style="background: #3b82f6;" data-color="#3b82f6" onclick="selectColor(this)"></div>
                    <div class="color-circle" style="background: #8b5cf6;" data-color="#8b5cf6" onclick="selectColor(this)"></div>
                    <div class="color-circle" style="background: #ec4899;" data-color="#ec4899" onclick="selectColor(this)"></div>
                    <div class="color-circle" style="background: #06b6d4;" data-color="#06b6d4" onclick="selectColor(this)"></div>
                </div>
            </div>

            <button class="btn-save" id="btnCreateSubject" onclick="saveNewSubject()">Create Subject Card</button>
        </div>
    </div>

    <script>
        // --- STATE ---
        let selectedThemeColor = '#6366f1'; // Default color matches the image

        // --- DATA MANAGEMENT ---
        function getSubjects() {
            try {
                let data = localStorage.getItem('ss_user_subjects');
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        }

        function saveSubjects(subjectsArray) {
            localStorage.setItem('ss_user_subjects', JSON.stringify(subjectsArray));
            renderSubjects();
        }

        // --- RENDERING ---
        function renderSubjects() {
            const container = document.getElementById('subjectsContainer');
            const subjects = getSubjects();

            container.innerHTML = '';

            if (subjects.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open" style="font-size: 40px; margin-bottom: 15px; color: #27272a;"></i>
                        <p>No subject vaults yet. Click 'New Subject' to get started!</p>
                    </div>
                `;
                return;
            }

            subjects.forEach(sub => {
                let avg = 0;
                if (sub.grades && sub.grades.length > 0) {
                    let total = sub.grades.reduce((sum, g) => sum + g.percentage, 0);
                    avg = Math.round(total / sub.grades.length);
                }

                let notesCount = sub.notes ? sub.notes.length : 0;
                let gradesCount = sub.grades ? sub.grades.length : 0;
                
                // Use saved color, or fallback to default purple
                let themeColor = sub.color || '#6366f1'; 

                // Injecting dynamic themeColor into the inline styles
                const cardHTML = `
                    <div class="subject-card" onclick="openVault('${sub.name}')" style="border-top: 4px solid ${themeColor};">
                        <div class="card-header">
                            <div class="card-icon" style="color: ${themeColor}; background: ${themeColor}20;">
                                <i class="fas fa-book"></i>
                            </div>
                            <div class="card-actions">
                                ${gradesCount > 0 ? `<div class="grade-badge">${avg}% Avg</div>` : `<div class="grade-badge" style="color: #a1a1aa; background: #27272a;">No Grades</div>`}
                                <button class="delete-btn" title="Delete Subject" onclick="deleteSubject(event, '${sub.name}')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                        <div>
                            <div class="card-title">${sub.name}</div>
                            <div class="card-stats">
                                <span><i class="fas fa-file-alt"></i> ${notesCount} Notes</span>
                                <span><i class="fas fa-chart-bar"></i> ${gradesCount} Assessments</span>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // --- NAVIGATION ---
        function openVault(subjectName) {
            window.location.href = `subject-details.html?sub=${encodeURIComponent(subjectName)}`;
        }

        // --- DELETE LOGIC ---
        function deleteSubject(event, subjectName) {
            // Stop the click from opening the vault!
            event.stopPropagation(); 
            
            if(confirm(`Are you sure you want to delete the vault for "${subjectName}"? This will permanently delete all notes and grades inside it.`)) {
                let subjects = getSubjects();
                subjects = subjects.filter(s => s.name !== subjectName);
                saveSubjects(subjects);
            }
        }

        // --- MODAL LOGIC ---
        function openSubjectModal() {
            document.getElementById('subjectModal').style.display = 'flex';
            document.getElementById('newSubjectName').value = '';
            document.getElementById('newSubjectName').focus();
            
            // Reset color picker to first option
            const firstColor = document.querySelector('.color-circle');
            selectColor(firstColor);
        }

        function closeSubjectModal() {
            document.getElementById('subjectModal').style.display = 'none';
        }

        // --- COLOR PICKER LOGIC ---
        function selectColor(element) {
            // Remove 'selected' class from all circles
            document.querySelectorAll('.color-circle').forEach(el => {
                el.classList.remove('selected');
            });
            // Add 'selected' to clicked circle
            element.classList.add('selected');
            // Save the color hex
            selectedThemeColor = element.getAttribute('data-color');
            
            // Change the Create button background to match!
            document.getElementById('btnCreateSubject').style.background = selectedThemeColor;
        }

        function saveNewSubject() {
            const nameInput = document.getElementById('newSubjectName').value.trim();
            if (!nameInput) {
                alert("Please enter a subject name.");
                return;
            }

            let subjects = getSubjects();
            
            if (subjects.find(s => s.name.toLowerCase() === nameInput.toLowerCase())) {
                alert("A vault for this subject already exists!");
                return;
            }

            // Create subject and save the chosen color!
            const newSub = {
                name: nameInput,
                color: selectedThemeColor, // <-- Saving the theme color!
                grades: [],
                notes: [],
                avg: 0
            };

            subjects.push(newSub);
            saveSubjects(subjects);
            closeSubjectModal();
        }

        // Initialize the page
        renderSubjects();
    </script>
<script src="aura-plugin.js"></script>
</body>
</html>
